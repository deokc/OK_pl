<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OK-Harmonics Playlist</title>
    <style>
        :root {
            --bg-deep: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --neon-pink: #ff007a;
            --neon-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 20% 30%, #1a1b26 0%, #0b0e14 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 90%;
            max-width: 1100px;
            height: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 왼쪽: 현재 재생 구역 */
        .player-left {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .album-cover {
            width: 100%;
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            margin-bottom: 30px;
            position: relative;
        }

        .album-cover img {
            width: 100%; height: 100%; object-fit: cover;
        }

        .now-playing-info h2 {
            margin: 0; font-size: 1.8rem; letter-spacing: -0.5px;
        }

        .now-playing-info p {
            color: var(--neon-cyan); margin: 8px 0 20px; font-size: 1rem; opacity: 0.8;
        }

        /* 컨트롤 및 프로그레스바 */
        .audio-controls { width: 100%; }
        
        .progress-area {
            height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
            margin-bottom: 20px; cursor: pointer; position: relative;
        }

        .progress-bar {
            height: 100%; background: var(--neon-pink); width: 0%;
            box-shadow: 0 0 10px var(--neon-pink); border-radius: 2px;
        }

        .buttons {
            display: flex; align-items: center; gap: 30px; justify-content: center;
        }

        .btn {
            background: none; border: none; color: white; cursor: pointer; font-size: 1.5rem;
            transition: 0.2s; opacity: 0.7;
        }
        .btn:hover { opacity: 1; transform: scale(1.1); }
        .play-btn { font-size: 3rem; opacity: 1; color: var(--neon-cyan); }

        /* 오른쪽: 플레이리스트 구역 */
        .playlist-right {
            flex: 1;
            padding: 30px;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            font-size: 1.2rem; font-weight: bold; margin-bottom: 20px;
            padding-bottom: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
        }

        .track-list {
            list-style: none; padding: 0; margin: 0;
            overflow-y: auto; flex-grow: 1;
        }

        .track-list::-webkit-scrollbar { width: 5px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .track-item {
            display: flex; align-items: center; padding: 12px;
            border-radius: 12px; cursor: pointer; transition: 0.2s;
            margin-bottom: 8px; border: 1px solid transparent;
        }

        .track-item:hover { background: rgba(255, 255, 255, 0.05); }

        .track-item.active {
            background: rgba(255, 0, 122, 0.1);
            border: 1px solid rgba(255, 0, 122, 0.3);
        }

        .track-number { width: 30px; color: var(--text-dim); font-size: 0.9rem; }
        .track-item.active .track-number { color: var(--neon-pink); font-weight: bold; }

        .track-title { flex: 1; font-size: 0.95rem; }
        .track-item.active .track-title { color: var(--neon-pink); }

        .track-duration { color: var(--text-dim); font-size: 0.8rem; }

    </style>
</head>
<body>

<div class="main-container">
    <div class="player-left">
        <div class="album-cover">
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?auto=format&fit=crop&w=800&q=80" id="mainArt">
        </div>
        <div class="now-playing-info">
            <h2 id="displayTitle">트랙을 선택하세요</h2>
            <p id="displayAlbum">OK-Playlist</p>
        </div>
        <div class="audio-controls">
            <div class="progress-area" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="buttons">
                <button class="btn" onclick="prevTrack()">&#x23EE;</button>
                <button class="btn play-btn" id="playBtn" onclick="togglePlay()">&#x23F5;</button>
                <button class="btn" onclick="nextTrack()">&#x23ED;</button>
            </div>
        </div>
    </div>

    <div class="playlist-right">
        <div class="playlist-header">다음 트랙</div>
        <ul class="track-list" id="trackList">
            </ul>
    </div>
</div>

<audio id="mainAudio"></audio>

<script>
    // 🎵 깃허브 링크를 원본(raw) 파일 링크로 수정했습니다!
    const playlist = [
        {
            title: "우리가 누구?",
            link: "https://raw.githubusercontent.com/deokc/OK_pl/main/%EC%9A%B0%EB%A6%AC%EA%B0%80%20%EB%88%84%EA%B5%AC_02.mp3",
            duration: "2:46"
        },
        {
            title: "우리가 누구? (k-pop.ver)",
            link: "https://raw.githubusercontent.com/deokc/OK_pl/main/%EC%9A%B0%EB%A6%AC%EA%B0%80%20%EB%88%84%EA%B5%AC_04.mp3",
            duration: "3:02"
        },
        {
            title: "곰방대 연기처럼",
            link: "https://raw.githubusercontent.com/deokc/OK_pl/main/%EA%B3%B0%EB%B0%A9%EB%8C%80%20%EC%97%B0%EA%B8%B0%EC%B2%98%EB%9F%BC_02.mp3",
            duration: "5:23"
        },
        {
            title: "When Belief Becomes Real",
            link: "https://raw.githubusercontent.com/deokc/OK_pl/main/When%20Belief%20Becomes%20Real_03.mp3",
            duration: "3:49"
        },
        {
            title: "도시의 속삭임",
            link: "https://raw.githubusercontent.com/deokc/OK_pl/main/%EB%8F%84%EC%8B%9C%EC%9D%98%20%EC%86%8D%EC%82%AD%EC%9E%84_02.mp3",
            duration: "3:14"
        }
    ];

    const audio = document.getElementById('mainAudio');
    const trackListElem = document.getElementById('trackList');
    const playBtn = document.getElementById('playBtn');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const displayTitle = document.getElementById('displayTitle');

    let currentIndex = 0;

    // 리스트 화면 생성
    function renderPlaylist() {
        trackListElem.innerHTML = '';
        playlist.forEach((track, index) => {
            const li = document.createElement('li');
            li.className = `track-item ${index === currentIndex ? 'active' : ''}`;
            li.innerHTML = `
                <span class="track-number">${String(index + 1).padStart(2, '0')}</span>
                <span class="track-title">${track.title}</span>
                <span class="track-duration">${track.duration}</span>
            `;
            li.onclick = () => loadTrack(index);
            trackListElem.appendChild(li);
        });
    }

    // 곡 로드 및 재생
    function loadTrack(index) {
        currentIndex = index;
        const track = playlist[index];
        audio.src = track.link;
        displayTitle.textContent = track.title;
        
        renderPlaylist();
        audio.play();
        playBtn.innerHTML = "&#x23F8;"; // 일시정지 아이콘
    }

    function togglePlay() {
        if (audio.paused) {
            if (!audio.src) loadTrack(0);
            else {
                audio.play();
                playBtn.innerHTML = "&#x23F8;";
            }
        } else {
            audio.pause();
            playBtn.innerHTML = "&#x23F5;";
        }
    }

    function nextTrack() {
        currentIndex = (currentIndex + 1) % playlist.length;
        loadTrack(currentIndex);
    }

    function prevTrack() {
        currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
        loadTrack(currentIndex);
    }

    // 프로그레스 바 업데이트
    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = pct + "%";
    };

    // 프로그레스 바 클릭 시 이동
    progressContainer.onclick = (e) => {
        const width = progressContainer.clientWidth;
        const clickX = e.offsetX;
        audio.currentTime = (clickX / width) * audio.duration;
    };

    // 곡 끝나면 다음 곡으로
    audio.onended = nextTrack;

    // 초기 실행
    renderPlaylist();
</script>

</body>
</html>
